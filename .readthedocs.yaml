version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.13"
  jobs: # https://docs.readthedocs.com/platform/stable/build-customization.html#install-dependencies-with-uv
    pre_create_environment:
      - asdf plugin add uv
      - asdf install uv latest
      - asdf global uv latest
    create_environment:
      - uv venv "${READTHEDOCS_VIRTUALENV_PATH}"
    install:
      - UV_PROJECT_ENVIRONMENT="${READTHEDOCS_VIRTUALENV_PATH}" uv sync --upgrade --extra cpu --group dev --group docs --group test

sphinx:
  configuration: docs/source/conf.py

formats:
  - pdf
